<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>歷史小年表 🌏 台灣×中國×世界</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FEF9F2;
  --grid:#F4E7D8;
  --ink:#5B4A42;
  --ink-soft:#9A867C;
  --pre:#B9AA97;     /* 史前 石陶棕 */
  --dutch:#FF9E94;   /* 荷西 珊瑚粉 */
  --zheng:#FFC163;   /* 明鄭 蜂蜜橘 */
  --qing:#8FCB94;    /* 清領 抹茶綠 */
  --japan:#8FBEEC;   /* 日治 蘇打藍 */
  --roc:#C0A3E8;     /* 民國 薰衣草 */
  --cn:#F08FB4;      /* 中國 莓果粉 */
  --world:#6FC7B6;   /* 世界 薄荷綠 */
  --span:#5E9C6B;    /* 古文明區間線 */
  --card-shadow:0 3px 0 rgba(91,74,66,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Baloo 2',"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  color:var(--ink);
  background:var(--paper);
  overflow:hidden;
  display:flex;flex-direction:column;
}
header{
  flex:0 0 auto;
  padding:10px 14px 8px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(6px);
  border-bottom:2px dashed var(--grid);
  z-index:20;
}
.title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
h1{font-size:20px;font-weight:800;letter-spacing:1px}
h1 .deco{font-size:16px}
.hint{font-size:12px;color:var(--ink-soft)}
.toolbar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.chip{
  border:2px solid transparent;border-radius:999px;
  padding:4px 12px;font-size:13px;font-weight:700;font-family:inherit;
  cursor:pointer;color:#fff;box-shadow:var(--card-shadow);
  transition:transform .12s;
}
.chip:active{transform:scale(.93)}
.chip:focus-visible{outline:3px solid #5B4A42;outline-offset:2px}
.chip.c-pre{background:var(--pre)}
.chip.c-ancient{background:var(--cn)}
.chip.c-mid{background:var(--world)}
.chip.c-dutch{background:var(--dutch)}
.chip.c-qing{background:var(--qing)}
.chip.c-japan{background:var(--japan)}
.chip.c-roc{background:var(--roc)}
.zoom-group{margin-left:auto;display:flex;gap:6px}
.zbtn{
  width:34px;height:34px;border-radius:12px;border:2px solid var(--grid);
  background:#fff;font-size:17px;font-weight:800;color:var(--ink);
  cursor:pointer;box-shadow:var(--card-shadow);font-family:inherit;
  transition:transform .12s;
}
.zbtn:active{transform:scale(.9)}
.zbtn:focus-visible{outline:3px solid #5B4A42;outline-offset:2px}
.zbtn.reset{width:auto;padding:0 10px;font-size:13px}
#viewport{
  flex:1 1 auto;position:relative;overflow:hidden;
  touch-action:none;cursor:grab;
  background:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    var(--paper);
  background-size:34px 34px,34px 34px,auto;
}
#viewport.dragging{cursor:grabbing}
#world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform}
.band{position:absolute;height:22px;border-radius:6px;opacity:.30}
.band::before,.band::after{
  content:"";position:absolute;top:0;bottom:0;width:8px;
  background:repeating-linear-gradient(45deg,#fff 0 4px,transparent 4px 8px);
}
.band::before{left:0}.band::after{right:0}
.era-tag{
  position:absolute;transform:translateX(-50%) rotate(-2deg);
  padding:5px 14px;border-radius:4px 14px 4px 14px;
  font-weight:800;font-size:14px;color:#fff;letter-spacing:2px;
  box-shadow:var(--card-shadow);white-space:nowrap;
}
.era-tag small{display:block;font-size:10px;letter-spacing:0;text-align:center;opacity:.9}
.era-tag.mini{font-size:12px;padding:3px 10px;letter-spacing:1px}
.sub-tag{
  position:absolute;transform:translateX(-50%);
  font-size:12px;font-weight:800;color:var(--cn);letter-spacing:3px;white-space:nowrap;
}
.axis{position:absolute;height:4px;border-radius:2px;background:var(--ink);opacity:.75}
.tick{position:absolute;width:2px;height:10px;background:var(--ink-soft);opacity:.6}
.tick-label{
  position:absolute;transform:translateX(-50%);
  font-size:11px;font-weight:700;color:var(--ink-soft);white-space:nowrap;
}
/* 古文明區間線（模仿手寫筆記的綠色橫線） */
.span{position:absolute;height:3px;border-radius:2px;background:var(--span);opacity:.85}
.span::before,.span::after{
  content:"";position:absolute;top:-5px;width:3px;height:13px;background:var(--span);border-radius:2px;
}
.span::before{left:0}.span::after{right:0}
.span .sp-l{
  position:absolute;left:50%;top:-22px;transform:translateX(-50%);
  font-size:13px;font-weight:800;color:var(--span);letter-spacing:4px;white-space:nowrap;
  background:rgba(254,249,242,.85);padding:0 6px;border-radius:6px;
}
.span .sp-a,.span .sp-b{
  position:absolute;top:7px;font-size:10.5px;font-weight:700;color:var(--span);white-space:nowrap;
}
.span .sp-a{left:0;transform:translateX(-50%)}
.span .sp-b{right:0;transform:translateX(50%)}
/* 車道浮動標籤 */
.lane-badge{
  position:absolute;left:10px;z-index:16;pointer-events:none;
  font-size:13px;font-weight:800;color:var(--ink);
  letter-spacing:2px;background:rgba(255,255,255,.9);
  padding:3px 12px;border-radius:999px;border:2px dashed var(--grid);
  box-shadow:var(--card-shadow);white-space:nowrap;
}
.stem{position:absolute;width:2px;background:var(--ink-soft);opacity:.35}
.dot{
  position:absolute;width:12px;height:12px;border-radius:50%;
  transform:translate(-50%,-50%);border:3px solid #fff;
  box-shadow:0 0 0 2px rgba(91,74,66,.15);
}
.card{
  position:absolute;transform:translateX(-50%);
  width:126px;padding:6px 8px 7px;
  background:#fff;border:2.5px solid;
  border-radius:14px 4px 14px 4px;
  box-shadow:var(--card-shadow);
  text-align:center;cursor:pointer;
  transition:transform .15s;
}
.card:hover{transform:translateX(-50%) scale(1.06) rotate(-1deg);z-index:5}
.card:focus-visible{outline:3px solid #5B4A42;outline-offset:2px;z-index:5}
.card .yr{font-size:12.5px;font-weight:800;letter-spacing:.3px;line-height:1.1}
.card .ttl{font-size:12.5px;font-weight:700;line-height:1.25;margin-top:2px}
.card{z-index:2}
.card.imp{border-width:3.5px}
.card.imp .ttl{color:#D0453C}
.card.imp::after{content:"\2B50";position:absolute;top:-11px;right:-9px;font-size:15px;transform:rotate(12deg);text-shadow:0 1px 0 #fff}
body.only-imp .card:not(.imp){opacity:.2;filter:grayscale(.75)}
body.only-imp .stem,body.only-imp .dot{opacity:.25}
.card.hot{background:linear-gradient(180deg,#FFF4E0,#fff 60%)}
.card.hot::before{content:"🔥";position:absolute;top:-10px;left:-8px;font-size:14px;transform:rotate(-14deg);text-shadow:0 1px 0 #fff;z-index:3}
body.only-hot .card:not(.hot){opacity:.2;filter:grayscale(.75)}
body.only-hot .stem,body.only-hot .dot{opacity:.25}
.hotbar{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:12px;font-weight:700;color:#C77A1E;background:#FFF1DC;border:2px solid #F2C879;border-radius:999px;padding:3px 10px}
#links{position:absolute;left:0;top:0;z-index:1;pointer-events:none}
#links path.ln{fill:none;stroke:#E05B5B;stroke-width:2.5;stroke-dasharray:8 5;opacity:.7}
#links.hide{display:none}
.chip.tog{background:#fff;color:var(--ink);border:2px solid var(--grid)}
.chip.tog.on{background:#FFE3A6;border-color:#F2B33D}
#backdrop{
  position:fixed;inset:0;background:rgba(91,74,66,.35);
  display:none;align-items:center;justify-content:center;z-index:50;padding:20px;
}
#backdrop.show{display:flex}
#modal{
  background:#fff;max-width:400px;width:100%;
  border:3px solid var(--ink);
  border-radius:22px 8px 22px 8px;
  padding:20px 20px 18px;position:relative;
  box-shadow:6px 6px 0 rgba(91,74,66,.18);
  animation:pop .18s ease-out;
}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#m-tape{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%) rotate(-2deg);
  padding:4px 18px;border-radius:4px;color:#fff;font-weight:800;font-size:13px;
  letter-spacing:2px;box-shadow:var(--card-shadow);
}
#m-emo{font-size:34px;text-align:center;margin-top:6px}
#m-yr{text-align:center;font-size:15px;font-weight:800;color:var(--ink-soft);letter-spacing:1px}
#m-ttl{text-align:center;font-size:20px;font-weight:800;margin:2px 0 10px}
#m-desc{font-size:14.5px;line-height:1.75}
#m-close{
  display:block;margin:16px auto 0;padding:7px 26px;
  border-radius:999px;border:2px solid var(--ink);background:#FFEDD9;
  font-family:inherit;font-weight:800;font-size:14px;color:var(--ink);cursor:pointer;
  transition:transform .12s;
}
#m-close:active{transform:scale(.93)}
#m-close:focus-visible{outline:3px solid #5B4A42;outline-offset:2px}
#mascot{
  position:absolute;left:22%;width:66px;height:84px;
  z-index:15;cursor:pointer;user-select:none;
}
#mascot .sprite{width:100%;height:100%;transform-origin:50% 100%;transition:transform .15s}
#mascot.flip .sprite{transform:scaleX(-1)}
#mascot .body{transform-origin:33px 60px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
#mascot .leg-l{transform-origin:27px 58px}
#mascot .leg-r{transform-origin:39px 58px}
#mascot.running .body{animation:none;transform:translateY(-2px) rotate(4deg)}
#mascot.running .leg-l{animation:runA .28s linear infinite}
#mascot.running .leg-r{animation:runB .28s linear infinite}
@keyframes runA{0%,100%{transform:rotate(30deg)}50%{transform:rotate(-30deg)}}
@keyframes runB{0%,100%{transform:rotate(-30deg)}50%{transform:rotate(30deg)}}
#cheer{
  position:absolute;bottom:100%;left:50%;
  transform:translateX(-50%) translateY(6px) scale(.8);
  background:#fff;border:2.5px solid var(--ink);
  border-radius:14px 14px 14px 3px;
  padding:5px 11px;font-size:13px;font-weight:700;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
  box-shadow:var(--card-shadow);
}
#cheer.show{opacity:1;transform:translateX(-50%) translateY(-4px) scale(1)}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
@media (max-width:520px){
  h1{font-size:16px}
  .hint{display:none}
  .chip{padding:3px 9px;font-size:12px}
}
</style>
</head>
<body>

<header>
  <div class="title-row">
    <h1><span class="deco">🌸</span> 歷史小年表：台灣 × 中國 × 世界 <span class="deco">🧋</span></h1>
    <span class="hint">拖曳移動 ✦ 滾輪／雙指縮放 ✦ 點卡片看說明</span>
  </div>
  <div class="toolbar">
    <button class="chip c-pre" data-year="-5500" data-fy="990">史前</button>
    <button class="chip c-ancient" data-year="-750" data-fy="990">上古</button>
    <button class="chip c-mid" data-year="500" data-fy="990">中古</button>
    <button class="chip c-dutch" data-year="1500" data-fy="990">大航海</button>
    <button class="chip c-qing" data-year="1690" data-fy="830">清領</button>
    <button class="chip c-japan" data-year="1898" data-fy="830">日治</button>
    <button class="chip c-roc" data-year="1946" data-fy="830">民國</button>
    <button class="chip tog on" id="t-link" aria-pressed="true">🔗 因果線</button>
    <button class="chip tog" id="t-imp" aria-pressed="false">⭐ 只看重點</button>
    <button class="chip tog" id="t-hot" aria-pressed="false">🔥 只看考點</button>
    <div class="zoom-group">
      <button class="zbtn" id="zin" aria-label="放大">＋</button>
      <button class="zbtn" id="zout" aria-label="縮小">－</button>
      <button class="zbtn reset" id="zreset">回原點</button>
    </div>
  </div>
</header>

<div id="viewport" aria-label="台灣、中國、世界三軸互動年表，可拖曳與縮放">
  <div id="world"></div>
  <div class="lane-badge" id="lb-tw">🌱 台灣</div>
  <div class="lane-badge" id="lb-cn">🐉 中國</div>
  <div class="lane-badge" id="lb-wd">🌍 世界</div>
  <div id="mascot" role="button" tabindex="0" aria-label="吉祥物珍珠，點一下幫你加油">
    <div id="cheer"></div>
    <div class="sprite">
      <svg viewBox="0 0 66 84" width="66" height="84" xmlns="http://www.w3.org/2000/svg">
        <g class="leg leg-l">
          <rect x="24" y="56" width="6" height="16" rx="3" fill="#8A6A4F"/>
          <ellipse cx="27" cy="74" rx="6" ry="4" fill="#F49AC2" stroke="#5B4A42" stroke-width="2"/>
        </g>
        <g class="leg leg-r">
          <rect x="36" y="56" width="6" height="16" rx="3" fill="#8A6A4F"/>
          <ellipse cx="39" cy="74" rx="6" ry="4" fill="#F49AC2" stroke="#5B4A42" stroke-width="2"/>
        </g>
        <g class="body">
          <rect x="37" y="-2" width="8" height="20" rx="3.5" fill="#F49AC2" stroke="#5B4A42" stroke-width="2" transform="rotate(10 41 8)"/>
          <path d="M15,14 L51,14 L47,58 Q33,63 19,58 Z" fill="#F6D9AE" stroke="#5B4A42" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="25" cy="53" r="3.2" fill="#5B4A42"/>
          <circle cx="33" cy="55" r="3.2" fill="#5B4A42"/>
          <circle cx="41" cy="53" r="3.2" fill="#5B4A42"/>
          <rect x="12" y="8" width="42" height="9" rx="4.5" fill="#FFFDF8" stroke="#5B4A42" stroke-width="2.5"/>
          <rect x="7" y="30" width="12" height="6" rx="3" fill="#F6D9AE" stroke="#5B4A42" stroke-width="2" transform="rotate(28 13 33)"/>
          <rect x="47" y="30" width="12" height="6" rx="3" fill="#F6D9AE" stroke="#5B4A42" stroke-width="2" transform="rotate(-28 53 33)"/>
          <circle cx="26" cy="32" r="2.8" fill="#5B4A42"/>
          <circle cx="40" cy="32" r="2.8" fill="#5B4A42"/>
          <circle cx="27" cy="31" r="0.9" fill="#fff"/>
          <circle cx="41" cy="31" r="0.9" fill="#fff"/>
          <ellipse cx="21" cy="38" rx="3.2" ry="2" fill="#FFB5A7" opacity=".8"/>
          <ellipse cx="45" cy="38" rx="3.2" ry="2" fill="#FFB5A7" opacity=".8"/>
          <path d="M30,38 Q33,41 36,38" fill="none" stroke="#5B4A42" stroke-width="2" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
  </div>
</div>

<div id="backdrop">
  <div id="modal" role="dialog" aria-modal="true">
    <div id="m-tape"></div>
    <div id="m-emo"></div>
    <div id="m-yr"></div>
    <div id="m-ttl"></div>
    <div id="m-badges" style="text-align:center;margin:0 0 8px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap"></div>
    <div id="m-desc"></div>
    <button id="m-close">知道了！</button>
  </div>
</div>

<script>
/* ================= 資料 ================= */
const TW_ERAS = [
 {name:"史前時代", from:-50000, to:1624, color:"var(--pre)",  sub:"舊石器→新石器→金屬器"},
 {name:"荷西時期", from:1624, to:1662, color:"var(--dutch)"},
 {name:"明鄭時期", from:1662, to:1683, color:"var(--zheng)"},
 {name:"清領時期", from:1683, to:1895, color:"var(--qing)"},
 {name:"日治時期", from:1895, to:1945, color:"var(--japan)"},
 {name:"中華民國時期", from:1945, to:2012, color:"var(--roc)"},
];
function eraOf(y){ for(const e of TW_ERAS){ if(y>=e.from && y<e.to) return e; } return TW_ERAS[TW_ERAS.length-1]; }

const CN_ERAS = [
 {n:"夏", f:-2070, t:-1600},{n:"商", f:-1600, t:-1100},{n:"西周", f:-1100, t:-771},
 {n:"東周", f:-770, t:-256},{n:"秦", f:-221, t:-206},{n:"漢", f:-202, t:220},
 {n:"魏晉南北朝", f:220, t:581},{n:"隋", f:581, t:618},{n:"唐", f:618, t:907},
 {n:"五代", f:907, t:960},{n:"宋", f:960, t:1279},{n:"元", f:1271, t:1368},
 {n:"明", f:1368, t:1644},{n:"清", f:1644, t:1912},{n:"民國以後", f:1912, t:2012},
];
function cnEraOf(y){ let hit={n:"遠古"}; for(const e of CN_ERAS){ if(y>=e.f) hit=e; } return hit; }

const SPANS = [
 {n:"西亞古文明", f:-3500, t:-330, row:0},
 {n:"埃及古文明", f:-3100, t:-525, row:1},
 {n:"印度古文明", f:-3300, t:-1300, row:2},
 {n:"希臘文明",   f:-1800, t:-323, row:3},
 {n:"羅馬（王政→帝國）", f:-753, t:476, row:2},
 {n:"鄂圖曼土耳其帝國", f:1299, t:1923, row:0},
];

/* lane: tw / cn / wd。yl = 顯示用年份文字（約略年代） */
const EVENTS = [
/* ============ 台灣 ============ */
 {lane:"tw", y:-50000, yl:"約5萬年前", emo:"🪨", t:"長濱文化（舊石器）", hot:1, d:"台灣目前已知最早的史前文化，在台東長濱八仙洞發現。以敲打的石器維生，過採集、漁獵生活，還不會農耕與製陶。"},
 {lane:"tw", y:-5500, yl:"約BC5500", emo:"🏺", t:"大坌坑文化（新石器早期）", hot:1, d:"新石器時代早期代表，出現磨製石器與粗繩紋陶器，開始原始農耕，被認為與南島語族祖先關係密切。"},
 {lane:"tw", y:-2500, yl:"約BC2500", emo:"🗿", t:"圓山・卑南文化（新石器中晚期）", hot:1, d:"新石器時代中晚期代表：北部圓山文化留下大量貝塚；台東卑南文化有石板棺與玉器陪葬，農耕聚落規模擴大。"},
 {lane:"tw", y:100, yl:"約2千年前", emo:"⚒️", t:"十三行文化（金屬器）", hot:1, d:"金屬器時代代表，位於新北八里。已會煉鐵，並出土中國銅錢等文物，顯示與外界有貿易往來，可能與平埔族凱達格蘭族有關。"},
 {lane:"tw", y:1624, emo:"🏰", t:"荷蘭佔領南台灣", hot:1, s:1, d:"荷蘭東印度公司佔領大員（今台南安平），興建熱蘭遮城，展開約38年統治，招募漢人來台開墾、傳教並發展轉口貿易。"},
 {lane:"tw", y:1626, emo:"⛪", t:"西班牙佔北台灣", d:"西班牙人佔領雞籠（基隆）、淡水，建聖薩爾瓦多城等據點，1642年被荷蘭人驅逐，退出台灣。"},
 {lane:"tw", y:1652, emo:"🔥", t:"郭懷一事件", d:"漢人領袖郭懷一因不滿荷蘭人重稅剝削起兵抗荷，事敗被殺，是荷治時期最大規模的漢人反抗事件。"},
 {lane:"tw", y:1662, emo:"⚔️", t:"鄭成功驅逐荷蘭", hot:1, s:1, d:"鄭成功攻下熱蘭遮城，荷蘭人退出台灣，開啟鄭氏三代治台。設承天府，推行寓兵於農的屯田，奉明正朔「反清復明」。"},
 {lane:"tw", y:1683, emo:"🚢", t:"施琅攻台（清領開始）", hot:1, s:1, d:"施琅在澎湖海戰擊敗鄭軍，鄭克塽投降，台灣納入清朝版圖，隔年設一府三縣，隸屬福建省。"},
 {lane:"tw", y:1721, emo:"👑", t:"朱一貴事件", d:"清領時期第一次大民變。「鴨母王」朱一貴起事，一度攻下府城自稱中興王，後被清軍平定。"},
 {lane:"tw", y:1731, emo:"🏹", t:"大甲西社事件", hot:1, d:"台中大甲一帶平埔族因不堪官府勞役剝削起而抗清，是清代規模最大的原住民抗官事件，事後部分族人被迫遷徙。"},
 {lane:"tw", y:1740, emo:"💧", t:"瑠公圳開鑿", d:"郭錫瑠自1740年代起開鑿水圳灌溉台北盆地，後人感念稱「瑠公圳」，是清代重要水利建設之一。"},
 {lane:"tw", y:1786, emo:"🗡️", t:"林爽文事件", d:"天地會領袖林爽文起事，是清領時期規模最大的民變，清廷派福康安來台才平定，「嘉義」地名即由此而來。"},
 {lane:"tw", y:1796, emo:"🌾", t:"吳沙開墾蛤仔難", d:"吳沙率漳、泉、粵移民進入蛤仔難（噶瑪蘭，今宜蘭）開墾，建立頭圍（頭城）；1812年清廷正式設噶瑪蘭廳。"},
 {lane:"tw", y:1823, emo:"📜", t:"鄭用錫中進士", d:"竹塹（新竹）人鄭用錫考中進士，是第一位以台灣本籍身分中進士者，人稱「開台進士」。"},
 {lane:"tw", y:1858, emo:"⛵", t:"開港通商", hot:1, id:"b2", s:1, d:"英法聯軍後簽訂天津條約，台灣陸續開放安平、淡水、雞籠、打狗等港口，茶、糖、樟腦大量外銷，經濟重心逐漸北移。"},
 {lane:"tw", y:1862, emo:"⚔️", t:"戴潮春事件", d:"戴潮春（戴萬生）起事，歷時約三年，是清領時期歷時最久的民變。"},
 {lane:"tw", y:1871, y2:1874, emo:"🌊", t:"牡丹社事件", hot:1, id:"tw_mudan", s:1, d:"琉球漂民被排灣族殺害，日本以此為藉口於1874年出兵台灣。事後清廷轉為積極治台，派沈葆楨來台開山撫番、增設行政區。"},
 {lane:"tw", y:1884, y2:1885, emo:"💥", t:"清法戰爭波及台灣", hot:1, id:"d1", d:"清法戰爭期間法軍攻基隆、淡水並封鎖台灣，劉銘傳督辦台灣防務；戰後清廷更加重視台灣地位。"},
 {lane:"tw", y:1885, emo:"🏛️", t:"台灣建省", hot:1, id:"d2", s:1, d:"清法戰爭後清廷決定台灣建省，劉銘傳出任首任巡撫，推動鐵路、電報、清賦等新政，政治中心逐漸北移台北。"},
 {lane:"tw", y:1895, emo:"📄", t:"乙未割台・抗日", hot:1, id:"e3", s:1, d:"甲午戰敗簽馬關條約，割讓台灣、澎湖給日本。官紳成立「台灣民主國」抵抗，各地義軍展開乙未抗日，最終仍被日軍平定。"},
 {lane:"tw", y:1896, emo:"⚖️", t:"六三法", hot:1, d:"日本國會通過「六三法」，授權台灣總督可發布具法律效力的命令，確立總督集行政、立法、司法、軍事大權於一身的特殊統治。"},
 {lane:"tw", y:1899, emo:"🏦", t:"台灣銀行成立", d:"總督府成立台灣銀行，統一幣制、發行貨幣，配合專賣制度與土地調查，建立殖民地經濟基礎。"},
 {lane:"tw", y:1905, emo:"📋", t:"首次人口普查", d:"台灣舉行第一次戶口普查（比日本本土還早），加上土地與林野調查，成為總督府統治與課稅的基礎資料。"},
 {lane:"tw", y:1908, emo:"🚂", t:"縱貫鐵路通車", hot:1, d:"基隆到高雄的縱貫鐵路全線通車，南北交通大幅改善，島內市場逐漸整合，形成「一日生活圈」。"},
 {lane:"tw", y:1913, emo:"🕵️", t:"苗栗事件", d:"羅福星以同盟會背景在苗栗籌畫抗日，事洩被捕殉難，屬於日治初期武裝抗日的尾聲之一。"},
 {lane:"tw", y:1915, emo:"⛩️", t:"噍吧哖事件（西來庵）", hot:1, s:1, d:"余清芳等人以宗教號召起事，是台灣人最後一次大規模「武裝」抗日，此後轉為政治社會運動路線。"},
 {lane:"tw", y:1915, emo:"🏫", t:"台中中學校成立", d:"林獻堂等士紳捐資創立台中中學校（今台中一中），是第一所專為台灣人子弟設立的中學。"},
 {lane:"tw", y:1919, emo:"🏢", t:"內地延長主義", id:"f3", d:"受一戰後民族自決思潮影響，日本改派文官總督，標榜「內地延長主義」同化政策，統治手段轉趨懷柔。"},
 {lane:"tw", y:1921, emo:"📚", t:"文化協會・議會請願", hot:1, id:"tw_assoc", s:1, d:"蔣渭水、林獻堂等成立台灣文化協會，透過演講、讀報社啟迪民智；同時期展開長達十餘年的「台灣議會設置請願運動」。"},
 {lane:"tw", y:1925, emo:"🌾", t:"二林事件", d:"彰化二林蔗農因甘蔗收購價格與製糖會社爆發衝突，是台灣第一次農民運動，帶動各地農民組合成立。"},
 {lane:"tw", y:1927, emo:"🗳️", t:"台灣民眾黨成立", d:"文化協會分裂後，蔣渭水等人另組台灣民眾黨，是台灣人成立的第一個政黨。"},
 {lane:"tw", y:1928, emo:"🎓", t:"台北帝國大學成立", d:"台北帝國大學（今國立台灣大學前身）成立，是日治時期台灣的最高學府。"},
 {lane:"tw", y:1930, emo:"🏹", t:"霧社事件", hot:1, s:1, d:"莫那魯道率賽德克族人起義抗日，遭日方以優勢武力鎮壓。此後日本調整理蕃政策，也是武裝抗日的尾聲。"},
 {lane:"tw", y:1930, emo:"🚜", t:"嘉南大圳完工", d:"八田與一設計的嘉南大圳與烏山頭水庫完工，嘉南平原化為良田，稻米與甘蔗產量大增。"},
 {lane:"tw", y:1934, emo:"⚡", t:"日月潭發電所完工", d:"日月潭水力發電所完工，提供工業化電力，台灣經濟從「工業日本、農業台灣」逐步轉向「工業台灣、農業南洋」。"},
 {lane:"tw", y:1935, emo:"🙋", t:"首次地方議員選舉", d:"在台灣地方自治聯盟（1930年成立）多年爭取下，台灣舉行史上第一次地方議員選舉（半數官派、半數民選，且有財產限制）。"},
 {lane:"tw", y:1937, emo:"🎌", t:"皇民化運動", hot:1, id:"g2", s:1, d:"中日戰爭爆發後，日本在台推行皇民化運動：說日語、改日本姓名、參拜神社等，並配合「南進政策」把台灣當作基地。"},
 {lane:"tw", y:1941, emo:"🏫", t:"國民學校", d:"小學校與公學校合併改制為「國民學校」，形式上台日兒童共學，實為皇民化教育的一環。"},
 {lane:"tw", y:1943, emo:"✏️", t:"六年義務教育", d:"日本在台實施六年制國民義務教育，就學率大幅提升（但帶有戰時動員與同化色彩）。"},
 {lane:"tw", y:1945, emo:"🕊️", t:"日本投降・光復", s:1, d:"二戰結束、日本投降。國民政府接收台灣，設「台灣省行政長官公署」，由陳儀出任行政長官。"},
 {lane:"tw", y:1947, emo:"🕯️", t:"二二八事件", hot:1, id:"tw_228", s:1, d:"因查緝私菸引發衝突，擴大為全島性抗爭與鎮壓（清鄉），造成許多傷亡，影響深遠。事後行政長官公署改制為省政府。"},
 {lane:"tw", y:1949, emo:"🚪", t:"政府遷台・戒嚴", hot:1, id:"h2", s:1, d:"國共內戰失利，中華民國政府遷台，同年宣布戒嚴，開始長達38年的戒嚴時期（至1987年），並實施動員戡亂體制。"},
 {lane:"tw", y:1949, emo:"🛡️", t:"古寧頭戰役", d:"共軍登陸金門古寧頭遭國軍擊退，穩住台海局勢，兩岸從此隔海對峙。"},
 {lane:"tw", y:1949, y2:1953, emo:"🌾", t:"土地改革", hot:1, s:1, d:"政府推動三階段土地改革：三七五減租（1949）→ 公地放領（1951）→ 耕者有其田（1953），農民取得土地、地主轉投資工商業。"},
 {lane:"tw", y:1951, y2:1965, emo:"💰", t:"美援時期", id:"i2", d:"韓戰爆發後美國協防台灣，並自1951年起提供經濟援助至1965年，協助台灣穩定物價、發展基礎建設與工業。"},
 {lane:"tw", y:1954, y2:1979, emo:"🤝", t:"中美共同防禦條約", d:"中華民國與美國簽訂共同防禦條約，美軍協防台灣；1979年中（共）美建交後條約終止，美國改以《台灣關係法》維持關係。"},
 {lane:"tw", y:1958, emo:"💣", t:"八二三砲戰", hot:1, s:1, d:"共軍猛烈砲擊金門，國軍固守成功，是兩岸最後一次大規模軍事衝突，此後形成長期對峙。"},
 {lane:"tw", y:1960, emo:"📰", t:"雷震案", d:"《自由中國》雜誌負責人雷震因籌組反對黨被捕入獄，顯示戒嚴時期言論與組黨自由受到壓制（白色恐怖時期案例）。"},
 {lane:"tw", y:1968, emo:"🎒", t:"九年國民義務教育", d:"義務教育由六年延長為九年，提升人力素質，配合台灣經濟起飛的人才需求。"},
 {lane:"tw", y:1971, emo:"🌐", t:"退出聯合國", hot:1, id:"tw_un", s:1, d:"聯合國通過第2758號決議，由中華人民共和國取得「中國」席位，中華民國宣布退出聯合國，外交陷入困境。"},
 {lane:"tw", y:1974, emo:"🏗️", t:"十大建設", id:"j2", d:"蔣經國推動十大建設（高速公路、桃園機場、鐵路電氣化、煉鋼、造船、石化等），帶領台灣度過石油危機、產業升級。"},
 {lane:"tw", y:1979, emo:"✊", t:"美麗島事件・台美斷交", id:"k2", s:1, d:"同年美國與中華民國斷交；年底《美麗島》雜誌社在高雄遊行爆發警民衝突，黨外人士遭逮捕審判，是民主運動重要轉捩點。"},
 {lane:"tw", y:1986, emo:"🌱", t:"民進黨成立", id:"tw_dpp", d:"民主進步黨在戒嚴末期成立，是突破黨禁的第一個反對黨，隔年政府宣布解嚴。"},
 {lane:"tw", y:1987, emo:"🔓", t:"解除戒嚴", hot:1, id:"tw_lift", s:1, d:"蔣經國宣布解除戒嚴，並開放民眾赴大陸探親；其後開放報禁、黨禁，政治逐步自由化。"},
 {lane:"tw", y:1990, emo:"🌸", t:"野百合學運", d:"大學生聚集中正紀念堂（三月學運），要求解散國民大會、廢除臨時條款、召開國是會議，加速民主改革腳步。"},
 {lane:"tw", y:1991, emo:"📕", t:"終止動員戡亂", d:"李登輝總統宣告終止動員戡亂時期、廢除臨時條款，資深中央民代全面退職、國會全面改選，回歸憲政。"},
 {lane:"tw", y:1993, emo:"🤝", t:"辜汪會談", d:"海基會辜振甫與海協會汪道涵在新加坡會談，是兩岸分治以來第一次正式協商。"},
 {lane:"tw", y:1996, emo:"🗳️", t:"首次總統直選", hot:1, s:1, d:"台灣舉行史上第一次總統直接民選，李登輝當選首任民選總統，是台灣民主化的重要里程碑。"},
 {lane:"tw", y:2002, emo:"🌏", t:"加入 WTO", d:"台灣以「台澎金馬個別關稅領域」名義正式加入世界貿易組織，經濟進一步與國際接軌。"},
 {lane:"tw", y:2008, emo:"✈️", t:"兩岸大三通", d:"兩岸實現全面直接通郵、通商、通航（大三通），交流往來更加密切。"},
/* ============ 中國 ============ */
 {lane:"cn", y:-2070, yl:"約BC2070", emo:"🏯", t:"禹建夏朝", s:1, d:"大禹治水有功繼位，其子啟開啟「父死子繼」的世襲制，夏是中國史上第一個王朝。"},
 {lane:"cn", y:-1600, yl:"約BC1600", emo:"🐢", t:"商湯滅夏建商", d:"商湯滅夏建立商朝。商代的甲骨文是目前所知中國最早的成熟文字。"},
 {lane:"cn", y:-1300, yl:"約BC1300", emo:"🏺", t:"盤庚遷殷", d:"商王盤庚將都城遷至殷（今河南安陽），此後商朝又稱「殷商」，政局趨於穩定。"},
 {lane:"cn", y:-1100, yl:"約BC1100", emo:"⚔️", t:"武王伐紂建西周", d:"周武王滅商建周，定都鎬京（史稱西周），推行封建制度與宗法制度。"},
 {lane:"cn", y:-771, emo:"🐺", t:"犬戎滅西周・平王東遷", s:1, d:"BC771犬戎攻破鎬京、西周滅亡；隔年周平王東遷雒邑，史稱東周（前期春秋、後期戰國），王室威信一落千丈。"},
 {lane:"cn", y:-667, yl:"約BC7世紀", emo:"👑", t:"齊桓公尊王攘夷", d:"齊桓公任用管仲改革，以「尊王攘夷」號召諸侯會盟，成為春秋第一位霸主。"},
 {lane:"cn", y:-403, emo:"🗡️", t:"三家分晉・戰國開始", d:"韓、趙、魏三家瓜分晉國並獲周天子承認，一般以此作為戰國時代的開始，此後七雄爭霸。"},
 {lane:"cn", y:-356, emo:"📜", t:"商鞅變法", id:"r1", s:1, d:"秦孝公任用商鞅變法，獎勵耕戰、厲行法治，秦國因此富強，奠定日後統一天下的基礎。"},
 {lane:"cn", y:-256, emo:"🏳️", t:"東周滅亡", d:"秦滅東周，周王室正式走入歷史。"},
 {lane:"cn", y:-221, emo:"🐉", t:"秦統一天下", id:"r2", s:1, d:"秦王政滅六國統一天下，自稱始皇帝，推行郡縣制，統一文字、度量衡與貨幣。"},
 {lane:"cn", y:-202, emo:"🏛️", t:"西漢建立（長安）", d:"劉邦擊敗項羽建立漢朝，定都長安，史稱西漢。"},
 {lane:"cn", y:-139, yl:"約BC139", emo:"🐫", t:"張騫出使西域", hot:1, s:1, d:"漢武帝派張騫兩度出使西域聯絡大月氏等國，打通中西交通，開啟絲路貿易。"},
 {lane:"cn", y:-134, emo:"🎓", t:"察舉制度", d:"漢武帝採董仲舒建議獨尊儒術，並推行察舉制度，由地方推舉孝廉等人才作官。"},
 {lane:"cn", y:25, emo:"🏯", t:"東漢建立（洛陽）", d:"劉秀（光武帝）重建漢朝，定都洛陽，史稱東漢。"},
 {lane:"cn", y:73, emo:"🐎", t:"班超出使西域", d:"東漢派班超經營西域三十餘年，重新打通絲路，鞏固漢朝在西域的勢力。"},
 {lane:"cn", y:91, emo:"🏹", t:"北匈奴西遷", d:"東漢大敗北匈奴，北匈奴向西遷徙，間接牽動歐亞民族的連鎖移動。"},
 {lane:"cn", y:184, emo:"🌾", t:"黃巾之亂", d:"張角以太平道號召農民起事，東漢政權名存實亡，群雄割據揭開三國序幕。"},
 {lane:"cn", y:220, emo:"🎭", t:"曹丕篡漢・九品官人法", d:"曹丕篡東漢建魏，開啟魏晉南北朝的長期分裂；同年採行九品官人法選才，日後演變為門第世族壟斷仕途。"},
 {lane:"cn", y:311, emo:"💥", t:"永嘉之禍", d:"匈奴攻陷洛陽、擄晉懷帝，西晉不久滅亡，北方進入五胡十六國時代，士族「衣冠南渡」。"},
 {lane:"cn", y:490, emo:"🈶", t:"北魏孝文帝漢化", d:"北魏孝文帝親政後推動漢化政策：遷都洛陽、改漢姓、說漢語、鼓勵通婚，促進胡漢融合。"},
 {lane:"cn", y:581, emo:"🏯", t:"隋朝建立", d:"楊堅（隋文帝）建立隋朝，589年滅陳統一南北，結束近四百年的分裂。"},
 {lane:"cn", y:587, emo:"📝", t:"科舉制度出現", hot:1, s:1, d:"隋文帝廢九品官人法、開科取士，科舉制度自此沿用約一千三百年，直到1905年才廢除。"},
 {lane:"cn", y:618, emo:"🌸", t:"唐朝建立", d:"李淵建立唐朝，定都長安，其後有貞觀之治、開元之治等盛世。"},

/* ================= 座標（分段比例尺） ================= */
const X0 = 100;
const SEGS = [
 [-50000,-4000,0.005],
 [-4000,-1500,0.16],
 [-1500,-700,0.4],
 [-700,200,0.75],
 [200,1400,0.7],
 [1400,1850,2.8],
 [1850,1930,20],
 [1930,2015,30],
];
function xOf(y){
  let x = X0;
  for(const [a,b,k] of SEGS){
    if(y <= a) break;
    x += (Math.min(y,b) - a) * k;
  }
  return x;
}
function fmtYear(y){
  if(y === -50000) return "BC5萬";
  return y < 0 ? "BC"+(-y) : String(y);
}

const LANES = {tw:520, cn:1120, wd:1720};
const WORLD_W = xOf(2015) + 220;
const WORLD_H = 1960;
const ROW_H = 78, CARD_W = 126;

/* 防重疊：同一車道依 x 排序，塞進最低可用列 */
function layoutRows(list){
  const ends = [];
  list.sort((a,b)=>xOf(a.y)-xOf(b.y));
  for(const ev of list){
    const x = xOf(ev.y);
    let r = 0;
    while(r < ends.length && x - CARD_W/2 < ends[r] + 10) r++;
    ev.row = r;
    ends[r] = x + CARD_W/2;
  }
}
layoutRows(EVENTS.filter(e=>e.lane==="tw"));
layoutRows(EVENTS.filter(e=>e.lane==="cn"));
layoutRows(EVENTS.filter(e=>e.lane==="wd"));

world.style.height = WORLD_H+"px";

/* --- 台灣：時代膠帶 + 標籤（交錯兩列避免重疊） --- */
TW_ERAS.forEach((e,i)=>{
  const x1 = xOf(e.from), x2 = xOf(e.to);
  html += `<div class="band" style="left:${x1}px;width:${x2-x1}px;top:${LANES.tw-9}px;background:${e.color}"></div>`;
  const sub = e.sub || `${fmtYear(e.from)} – ${e.to===2012?"":e.to}`;
  html += `<div class="era-tag" style="left:${(x1+x2)/2}px;top:${i%2? 52:12}px;background:${e.color}">${e.name}<small>${sub}</small></div>`;
});

  html += `<div class="band" style="left:${x1}px;width:${Math.max(x2-x1,6)}px;top:${LANES.cn-9}px;background:var(--cn);opacity:${i%2? .38:.22}"></div>`;
  html += `<div class="era-tag mini" style="left:${(x1+x2)/2}px;top:${CN_TAG_Y + (i%2? 34:0)}px;background:var(--cn)">${e.n}</div>`;
});

/* --- 世界：古文明區間線（仿手寫綠線） --- */
for(const s of SPANS){
  const x1 = xOf(s.f), x2 = xOf(s.t);
  const top = LANES.wd + 52 + s.row*34;
  html += `<div class="span" style="left:${x1}px;width:${x2-x1}px;top:${top}px">
             <span class="sp-l">${s.n}</span>
             <span class="sp-a">${fmtYear(s.f)}</span>
             <span class="sp-b">${fmtYear(s.t)}</span>
           </div>`;
}

/* --- 三條軸線與刻度 --- */
const AXIS_START = {tw:-50000, cn:-2300, wd:-3700};
const tickYears = [];
for(let y=-3500; y<-1500; y+=500) tickYears.push(y);
for(let y=-1500; y<-700; y+=200) tickYears.push(y);
for(let y=-700; y<200; y+=100) tickYears.push(y);
for(let y=200; y<1400; y+=100) tickYears.push(y);
for(let y=1400; y<1850; y+=50) tickYears.push(y);
for(let y=1850; y<=2010; y+=10) tickYears.push(y);

for(const lane of ["tw","cn","wd"]){
  const ay = LANES[lane], startY = AXIS_START[lane];
  const x1 = xOf(startY)-20, x2 = xOf(2012)+40;
  html += `<div class="axis" style="left:${x1}px;width:${x2-x1}px;top:${ay-2}px"></div>`;
  const ys = lane==="tw" ? [-50000,-20000,-10000,-5000,...tickYears.filter(t=>t>=-3500)] : tickYears.filter(t=>t>=startY);
  for(const y of ys){
    html += `<div class="tick" style="left:${xOf(y)}px;top:${ay+6}px"></div>
             <div class="tick-label" style="left:${xOf(y)}px;top:${ay+18}px">${y===-50000?"BC5萬":(y===-20000?"BC2萬":(y===-10000?"BC1萬":fmtYear(y)))}</div>`;
  }
}

/* --- 事件卡片 --- */
const laneColor = {cn:"var(--cn)", wd:"var(--world)"};
const POS = [];
EVENTS.forEach((ev,i)=>{
  const x = xOf(ev.y);
  const ay = LANES[ev.lane];
  const color = ev.lane==="tw" ? eraOf(ev.y).color : laneColor[ev.lane];
  const cardH = 62;
  const cardTop = ay - 40 - cardH - ev.row*ROW_H;
  POS[i] = {x, top:cardTop};
  const stemTop = cardTop + cardH, stemH = ay - stemTop;
  const yrText = (ev.yl || fmtYear(ev.y)) + (ev.y2 ? "–"+fmtYear(ev.y2) : "");
  html += `<div class="stem" style="left:${x-1}px;top:${stemTop}px;height:${stemH}px"></div>`;
  html += `<div class="dot" style="left:${x}px;top:${ay}px;background:${color}"></div>`;
  html += `<div class="card${ev.s?" imp":""}${ev.hot?" hot":""}" role="button" tabindex="0" data-i="${i}"
             style="left:${x}px;top:${cardTop}px;border-color:${color}">
             <div class="yr" style="color:${color}">${ev.emo} ${yrText}</div>
             <div class="ttl">${ev.t}</div>
           </div>`;
});

  const seen = new Set(), uniq = [];
  for(const pr of LINKS){ const k=pr[0]+">"+pr[1]; if(!seen.has(k)){seen.add(k);uniq.push(pr);} }
  LINKS.length = 0; LINKS.push(...uniq);
}
let paths = "";
function linkPath(ai,bi){
  const A = POS[ai], B = POS[bi];
  let sx,sy,ex,ey,cx,cy;
  if(Math.abs(A.top - B.top) < 8){            /* 同一列 → 側邊相連 */
    const dir = B.x >= A.x ? 1 : -1;
    sx = A.x + 65*dir; sy = A.top + 24;
    ex = B.x - 67*dir; ey = B.top + 24;
    cx = (sx+ex)/2; cy = Math.min(sy,ey) - 46;
  }else if(B.top < A.top){                    /* 目標在上 → 由上緣射出 */
    sx = A.x; sy = A.top - 2;
    ex = B.x; ey = B.top + 66;
    const bow = Math.max(60, Math.min(110, Math.abs(ex-sx)/2 + 40));
    cx = (sx+ex)/2 + (ex >= sx ? -bow : bow); cy = (sy+ey)/2;
  }else{                                      /* 目標在下 */
    sx = A.x; sy = A.top + 64;
    ex = B.x; ey = B.top - 4;
    const bow = Math.max(60, Math.min(110, Math.abs(ex-sx)/2 + 40));
    cx = (sx+ex)/2 + (ex >= sx ? -bow : bow); cy = (sy+ey)/2;
  }
  return `<path class="ln" marker-end="url(#arrh)" d="M${sx},${sy} Q${cx},${cy} ${ex},${ey}"/>`;
}
for(const [a,b] of LINKS){
  if(IDX[a]===undefined || IDX[b]===undefined) continue;
  paths += linkPath(IDX[a], IDX[b]);
}
html += `<svg id="links" width="${WORLD_W}" height="${WORLD_H}" viewBox="0 0 ${WORLD_W} ${WORLD_H}">
  <defs><marker id="arrh" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#E05B5B"/></marker></defs>${paths}</svg>`;

world.innerHTML = html;

/* ================= 縮放平移 ================= */
const vp = document.getElementById("viewport");
const S = {x:20, y:0, s:1, min:.22, max:3};

function apply(){
  world.style.transform = `translate(${S.x}px,${S.y}px) scale(${S.s})`;
  updateMascot();
  updateBadges();
}
/* 車道浮動標籤跟著捲動 */
const badges = {tw:document.getElementById("lb-tw"), cn:document.getElementById("lb-cn"), wd:document.getElementById("lb-wd")};
function updateBadges(){
  for(const k of ["tw","cn","wd"]){
    const sy = S.y + LANES[k]*S.s - 30;
    const y = Math.min(vp.clientHeight-34, Math.max(6, sy));
    badges[k].style.top = y + "px";
    badges[k].style.opacity = (sy < -420*S.s || sy > vp.clientHeight+80) ? .35 : 1;
  }
}
/* ---------- 吉祥物「珍珠」 ---------- */
const mascot = document.getElementById("mascot");
const cheerEl = document.getElementById("cheer");
function updateMascot(){
  const axisScreenY = S.y + LANES.tw*S.s;
  const y = Math.min(vp.clientHeight-46, Math.max(70, axisScreenY));
  mascot.style.top = (y - 80) + "px";
}
let runTimer = null;
function setRun(dx){
  if(Math.abs(dx) > 0.5) mascot.classList.toggle("flip", dx > 0);
  mascot.classList.add("running");
  clearTimeout(runTimer);
  runTimer = setTimeout(()=>mascot.classList.remove("running"), 200);
}
const CHEERS = ["加油加油！💪","背起來就是你的！✨","台灣・中國・世界一起對照！","休息5分鐘再衝～","會考穩了啦！🎉",
                "喝口水繼續！🧋","荷→鄭→清→日→民國！","你今天也超棒的！🌸","再複習一個時代吧！","BC在左、AD在右～"];
let cheerTimer = null;
function cheer(msg){
  cheerEl.textContent = msg || CHEERS[Math.floor(Math.random()*CHEERS.length)];
  cheerEl.classList.add("show");
  clearTimeout(cheerTimer);
  cheerTimer = setTimeout(()=>cheerEl.classList.remove("show"), 1900);
}
mascot.addEventListener("pointerdown", e=>e.stopPropagation());
mascot.addEventListener("click", ()=>cheer());
mascot.addEventListener("keydown", e=>{
  if(e.key==="Enter"||e.key===" "){ e.preventDefault(); cheer(); }
});
setTimeout(()=>cheer("嗨！我是珍珠 🧋 三條時間軸一起讀！"), 900);

function clamp(){
  S.s = Math.min(S.max, Math.max(S.min, S.s));
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const w = WORLD_W*S.s, h = WORLD_H*S.s;
  S.x = Math.min(80, Math.max(vw - w - 80, S.x));
  S.y = Math.min(80, Math.max(vh - h - 80, S.y));
  if(h < vh) S.y = (vh - h)/2;
}
function zoomAt(cx, cy, factor){
  const ns = Math.min(S.max, Math.max(S.min, S.s*factor));
  const k = ns/S.s;
  S.x = cx - (cx - S.x)*k;
  S.y = cy - (cy - S.y)*k;
  S.s = ns;
  clamp(); apply();
}
function fitStart(){
  const vw = vp.clientWidth, vh = vp.clientHeight;
  S.s = Math.min(.9, Math.max(.33, vh/2060));
  S.x = vw*0.3 - xOf(1875)*S.s;
  S.y = vh/2 - 830*S.s;
  clamp(); apply();
}
fitStart();
window.addEventListener("resize", ()=>{clamp();apply();});

vp.addEventListener("wheel", e=>{
  e.preventDefault();
  const r = vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, Math.exp(-e.deltaY*0.0016));
},{passive:false});

const pts = new Map();
let lastMid=null, lastDist=0, moved=0;
let downCard=null, downX=0, downY=0;
vp.addEventListener("pointerdown", e=>{
  try{ vp.setPointerCapture(e.pointerId); }catch(_){}
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  moved = 0;
  downX = e.clientX; downY = e.clientY;
  downCard = e.target.closest(".card");
  vp.classList.add("dragging");
  if(pts.size===2){
    const [a,b]=[...pts.values()];
    lastDist = Math.hypot(a.x-b.x,a.y-b.y);
    lastMid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
  }
});
vp.addEventListener("pointermove", e=>{
  if(!pts.has(e.pointerId)) return;
  const prev = pts.get(e.pointerId);
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pts.size===1){
    S.x += e.clientX - prev.x;
    S.y += e.clientY - prev.y;
    moved += Math.abs(e.clientX-prev.x)+Math.abs(e.clientY-prev.y);
    setRun(e.clientX - prev.x);
    clamp(); apply();
  }else if(pts.size===2){
    const [a,b]=[...pts.values()];
    const dist = Math.hypot(a.x-b.x,a.y-b.y);
    const mid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
    const r = vp.getBoundingClientRect();
    if(lastDist>0) zoomAt(mid.x-r.left, mid.y-r.top, dist/lastDist);
    S.x += mid.x-lastMid.x; S.y += mid.y-lastMid.y;
    clamp(); apply();
    lastDist = dist; lastMid = mid; moved += 10;
  }
});
function endPtr(e){
  try{ vp.releasePointerCapture(e.pointerId); }catch(_){}
  pts.delete(e.pointerId);
  if(pts.size<2){lastDist=0;lastMid=null;}
  if(pts.size===0){
    vp.classList.remove("dragging");
    const dist = Math.hypot(e.clientX-downX, e.clientY-downY);
    // 幾乎沒拖動 → 視為點擊。用放開座標實際找卡片（不依賴 e.target，
    // 因為桌機 setPointerCapture 會把 e.target 指向 viewport）
    if(downCard && dist < 8){
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const up = el && el.closest ? el.closest(".card") : null;
      if(up === downCard || up === null) openModal(+downCard.dataset.i);
    }
    downCard = null;
  }
}
vp.addEventListener("pointerup", endPtr);
vp.addEventListener("pointercancel", endPtr);

window.addEventListener("keydown", e=>{
  if(document.getElementById("backdrop").classList.contains("show")){
    if(e.key==="Escape") closeModal();
    return;
  }
  const step = 60;
  if(e.key==="ArrowLeft"){S.x+=step;clamp();apply();}
  if(e.key==="ArrowRight"){S.x-=step;clamp();apply();}
  if(e.key==="ArrowUp"){S.y+=step;clamp();apply();}
  if(e.key==="ArrowDown"){S.y-=step;clamp();apply();}
  if(e.key==="+"||e.key==="="){zoomAt(vp.clientWidth/2,vp.clientHeight/2,1.2);}
  if(e.key==="-"){zoomAt(vp.clientWidth/2,vp.clientHeight/2,1/1.2);}
});

document.getElementById("zin").onclick = ()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1.25);
document.getElementById("zout").onclick = ()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1/1.25);
document.getElementById("zreset").onclick = fitStart;
document.getElementById("t-imp").onclick = function(){
  document.body.classList.remove("only-hot");
  const hb=document.getElementById("t-hot"); hb.classList.remove("on"); hb.setAttribute("aria-pressed","false");
  const on = document.body.classList.toggle("only-imp");
  this.classList.toggle("on", on); this.setAttribute("aria-pressed", on);
  cheer(on ? "只顯示紅字重點⭐" : "顯示全部事件");
};
document.getElementById("t-hot").onclick = function(){
  document.body.classList.remove("only-imp");
  const ib=document.getElementById("t-imp"); ib.classList.remove("on"); ib.setAttribute("aria-pressed","false");
  const on = document.body.classList.toggle("only-hot");
  this.classList.toggle("on", on); this.setAttribute("aria-pressed", on);
  cheer(on ? "只顯示會考高頻考點🔥" : "顯示全部事件");
};
document.getElementById("t-link").onclick = function(){
  const hid = document.getElementById("links").classList.toggle("hide");
  this.classList.toggle("on", !hid); this.setAttribute("aria-pressed", !hid);
  cheer(hid ? "因果線已隱藏" : "紅色箭頭＝前因後果 🔗");
};
document.querySelectorAll(".chip[data-year]").forEach(btn=>{
  btn.onclick = ()=>{
    const y = +btn.dataset.year;
    const fy = +btn.dataset.fy || 830;
    S.s = Math.max(S.s, .85);
    S.x = vp.clientWidth*0.25 - xOf(y)*S.s;
    S.y = vp.clientHeight/2 - fy*S.s;
    clamp(); apply();
    setRun(-1);
    cheer(`出發去「${btn.textContent}」！🏃`);
  };
});

/* ================= 說明卡 ================= */
const backdrop = document.getElementById("backdrop");
function openModal(i){
  const ev = EVENTS[i];
  let tape;
  if(ev.lane==="tw"){ const e = eraOf(ev.y); tape = {name:"🌱 "+e.name, color:e.color}; }
  else if(ev.lane==="cn"){ tape = {name:"🐉 中國・"+cnEraOf(ev.y).n, color:"var(--cn)"}; }
  else{ tape = {name:"🌍 世界", color:"var(--world)"}; }
  document.getElementById("m-tape").textContent = tape.name;
  document.getElementById("m-tape").style.background = tape.color;
  document.getElementById("m-emo").textContent = ev.emo;
  document.getElementById("m-yr").textContent = (ev.yl || fmtYear(ev.y)) + (ev.y2 ? " – "+fmtYear(ev.y2) : "");
  document.getElementById("m-ttl").textContent = ev.t;
  let badges = "";
  if(ev.hot) badges += '<span class="hotbar">🔥 會考高頻考點</span>';
  if(ev.s)   badges += '<span class="hotbar" style="color:#D0453C;background:#FFE7E4;border-color:#F3B4AE">⭐ 課本紅字重點</span>';
  document.getElementById("m-badges").innerHTML = badges;
  document.getElementById("m-desc").textContent = ev.d;
  backdrop.classList.add("show");
  document.getElementById("m-close").focus();
}
function closeModal(){ backdrop.classList.remove("show"); }
document.getElementById("m-close").onclick = closeModal;
backdrop.addEventListener("click", e=>{ if(e.target===backdrop) closeModal(); });

world.addEventListener("keydown", e=>{
  const c = e.target.closest(".card");
  if(c && (e.key==="Enter"||e.key===" ")){ e.preventDefault(); openModal(+c.dataset.i); }
});
</script>
